syntax = "proto3";

package internalpb;

import "internal/actor.proto";
import "internal/grain.proto";

option go_package = "github.com/tochemey/goakt/v4/internal/internalpb;internalpb";

message PeerState {
  // Specifies the peer host
  string host = 1;
  // Specifies the remoting port
  int32 remoting_port = 2;
  // Specifies the remoting host
  int32 peers_port = 3;
  // Specifies the list of actors
  // actorName -> Actor
  map<string, internalpb.Actor> actors = 4;
  // grainId -> Grain
  map<string, internalpb.Grain> grains = 5;
}

message Rebalance {
  // Specifies the peer state
  PeerState peer_state = 1;
}

message RebalanceComplete {
  // Specifies the peer address
  string peer_address = 1;
}

// RelocateBatchRequest carries one target peer's share of a departed node's
// actors and grains, relocated in a single round trip.
message RelocateBatchRequest {
  // Specifies the remoting address (host:remoting_port) of the node that left
  // the cluster. The target uses it to clean up stale registry entries that
  // still point at the departed node before recreating the relocated actors
  // and grains.
  string departed_node = 1;
  // Specifies the actors to recreate on the target node
  repeated internalpb.Actor actors = 2;
  // Specifies the grains to activate on the target node
  repeated internalpb.Grain grains = 3;
}

// RelocateBatchResponse reports per-item relocation failures.
// An empty list means the whole batch was relocated successfully.
message RelocateBatchResponse {
  // Specifies the items that could not be relocated
  repeated RelocationFailure failures = 1;
}

// RelocationFailure describes a single actor or grain that could not be
// relocated as part of a RelocateBatchRequest.
message RelocationFailure {
  // Specifies the actor address or the grain identity string
  string id = 1;
  // Specifies whether the failed item is a grain
  bool grain = 2;
  // Specifies the failure reason
  string message = 3;
}

message PersistPeerActor {
  // Specifies the peer host
  string host = 1;
  // Specifies the remoting port
  int32 remoting_port = 2;
  // Specifies the remoting host
  int32 peers_port = 3;
  // Specifies the actor
  internalpb.Actor actor = 4;
}

message PersistPeerGrain {
  // Specifies the peer host
  string host = 1;
  // Specifies the remoting port
  int32 remoting_port = 2;
  // Specifies the remoting host
  int32 peers_port = 3;
  // Specifies the grain
  internalpb.Grain grain = 4;
}

message RemovePeerActor {
  // Specifies the peer address
  string peer_address = 1;
  // Specifies the remoting por
  // Specifies the actor name
  string actor_name = 2;
}

message RemovePeerGrain {
  // Specifies the peer address
  string peer_address = 1;
  internalpb.GrainId grain_id = 2;
}

message GetPeerState {
  // Specifies the peer address
  string peer_address = 1;
}

message DeletePeerState {
  // Specifies the peer address
  string peer_address = 1;
}
